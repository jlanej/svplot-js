name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: svplot-js/package-lock.json

      - name: Install dependencies
        working-directory: svplot-js
        run: npm ci

      - name: Run tests
        working-directory: svplot-js
        run: npx jest --coverage

      - name: Build
        working-directory: svplot-js
        run: npm run build

  generate-examples:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: svplot-js/package-lock.json

      - name: Install dependencies
        working-directory: svplot-js
        run: npm ci

      - name: Generate example images
        working-directory: svplot-js
        run: npx jest test/generate-images.test.js

      - name: Commit example images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add svplot-js/examples/images/
          if git diff --cached --quiet; then
            echo "No image changes to commit"
          else
            git commit -m "ci: update example images [skip ci]"
            git push
          fi
